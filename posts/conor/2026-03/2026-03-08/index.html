        <p>週日</p>
<p>朝早八點就起身, 喺屋企食麵包, 爸爸休息, 同家姐睇電視</p>
<p>中午去食大家樂,阿航有雞胸, 白飯, 再食啲通粉就一餐</p>
<p>食完一齊坐巴士去將南, 衰嘢坐巴士唔瞓</p>
<p>玩咗陣滑梯, 又唔肯踩單車, 去咗同爸爸散步</p>
<p>散完歩又想玩滑梯, 但家姐攰, 一齊返去坐巴士</p>
<p>一上巴士就瞓覺</p>
<p>夜晚喺屋企准山麵, 食完睇電視, 聽埋故事暈</p>
