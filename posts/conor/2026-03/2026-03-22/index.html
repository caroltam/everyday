        <p>週日</p>
<p>一早阿航就喺房瞓踢醒大家</p>
<p>朝早食腸粉同唐記, 然後換個衫出門口去花展</p>
<p>阿航去到好仔細睇啲花同聞啲花</p>
<p>睇完就去咗圖書館, 阿航又睇咗陣書</p>
<p>睇完書一齊去咗坐電車, 然後喺北角坐船返屋企</p>
<p>返屋企個個叫肚餓, 就開咗盒牛奶俾阿航, 唔太鍾意但飲曬</p>
<p>瞓咗陣, 阿航起身食飯, 食完飯跟家姐睇咗陣電視同打咗陣機, 阿航最叻都係貼貼紙同射飛機</p>
<p>十點瞓</p>
