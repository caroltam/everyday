        <p>週六</p>
<p>朝早如常起身，如常同麻麻玩，今日少食粟米，瘋狂食橙</p>
<p>蛋糕都係唔食</p>
<p>中午係咁話出去買玩具，咁送家姐出去，然後一齊同爸爸坐地鐵，最後去咗鑽石山</p>
<p>點知你而家真係無玩具買，食個元氣就返屋企瞓</p>
<p>瞓醒一齊去啟德玩具站揀玩具，最後揀咗橙色火車</p>
<p>買完去食飯，食完返去沖涼先開玩具，送埋媽媽揀嘅禮物，阿航勁開心</p>
<p>十一點熄燈秒睡</p>
