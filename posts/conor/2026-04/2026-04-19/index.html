        <p>週日</p>
<p>朝早航八點幾起身，一早大家就去大快活食早餐</p>
<p>航仔主力食通粉同糯米雞</p>
<p>然後今日雖然天氣好好，但無人想去公園，去咗圖書館</p>
<p>搵到本新雅嘅火車圖鑑，阿航沉咗船</p>
<p>然後去咗食薩利亞，兩條友唔太餓，食唔多</p>
<p>食完返屋企，兩個喺屋企玩到五點先喺媽咪張床睇書瞓著咗</p>
<p>航仔起身同爸爸媽媽食飯</p>
<p>食完飯沖完涼，一齊同爸爸睇足球，十點開始瞓，都好快秒睡</p>
